<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relógio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Fredoka+One&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
</head>

<body>

    <div class="stars" id="stars"></div>

    <div class="scene">

        <h1 class="titulo"> QUE HORAS SÃO? ⏰</h1>

        <div class="clock-wrap">
            <!-- Anel decorativo externo -->
            <div class="ring-outer"></div>
            <div class="ring-inner"></div>

            <div class="clock">
                <div class="numbers" id="numbers"></div>

                <div class="hand hour" id="hour"></div>
                <div class="hand minute" id="minute"></div>
                <div class="hand second" id="second"></div>

                <div class="center-dot">
                    <div class="center-core"></div>
                </div>
            </div>
        </div>

        <div class="digital-wrap">
            <div class="time-digital" id="time-digital">00:00:00</div>
        </div>

        <div class="date-label" id="date-label"></div>

    </div>

</body>

</html>
